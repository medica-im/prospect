services:
  db:
    image: postgres:18
    volumes:
      - ${POSTGRES_DATA}:/var/lib/postgresql
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  migrate:
    build: ./backend
    command: python manage.py migrate --noinput
    env_file:
      - .env
    environment:
      DJANGO_DEBUG: "False"
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  web:
    build: ./backend
    command: bash -c "python manage.py collectstatic --noinput && gunicorn prospect.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - ./staticfiles:/app/staticfiles
    env_file:
      - .env
    environment:
      DJANGO_DEBUG: "False"
      CELERY_BROKER_URL: "amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672//"
    ports:
      - "127.0.0.1:${DJANGO_PORT:-8000}:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  celery:
    build: ./backend
    command: celery -A prospect worker --loglevel=warning --concurrency=2
    env_file:
      - .env
    environment:
      DJANGO_DEBUG: "False"
      CELERY_BROKER_URL: "amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672//"
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE}
    env_file:
      - .env
    environment:
      NODE_OPTIONS: "--dns-result-order=ipv4first"
    links:
      - web
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - web
    restart: unless-stopped

volumes:
  postgres_data:
